<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Printit - Invitation Builder</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Montserrat', 'sans-serif'],
                        serif: ['"Cormorant Garamond"', 'serif'],
                    },
                    colors: {
                        brand: {
                            dark: '#2c2c2c',
                            light: '#f9f8f6',
                            accent: '#d4af37',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .sidebar { width: 450px; height: 100vh; overflow-y: auto; }
        .preview-area { flex-grow: 1; height: 100vh; background: #e5e7eb; position: relative; }
        iframe { width: 100%; height: 100%; border: none; }
        
        /* Modern Scrollbar */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #ccc; border-radius: 10px; }
        
        .tab-btn.active { border-bottom: 2px solid #d4af37; color: #d4af37; }
        .control-group { border-bottom: 1px solid #f0f0f0; padding-bottom: 1.5rem; margin-bottom: 1.5rem; }
    </style>
</head>
<body class="bg-white text-gray-800 font-sans antialiased overflow-hidden">

    <div class="flex h-screen">
        <!-- Left: Builder Controls -->
        <aside class="sidebar border-r border-gray-200 flex flex-col">
            <!-- Header -->
            <div class="p-6 bg-brand-dark text-white flex justify-between items-center">
                <div class="font-serif text-xl tracking-widest text-brand-accent">STUDIO PRINTIT</div>
                <div class="text-[10px] uppercase tracking-widest opacity-60">Builder v2.1</div>
            </div>

            <!-- Tabs Navigation -->
            <div class="flex border-b border-gray-100 sticky top-0 bg-white z-10 px-4">
                <button onclick="showTab('info')" id="tab-info" class="tab-btn flex-grow py-4 text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-brand-dark transition-all active">Genel</button>
                <button onclick="showTab('design')" id="tab-design" class="tab-btn flex-grow py-4 text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-brand-dark transition-all">Tasarım</button>
                <button onclick="showTab('images')" id="tab-images" class="tab-btn flex-grow py-4 text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-brand-dark transition-all">Görseller</button>
                <button onclick="showTab('list')" id="tab-list" class="tab-btn flex-grow py-4 text-[10px] uppercase tracking-widest font-bold text-gray-400 hover:text-brand-dark transition-all">Liste</button>
            </div>

            <!-- Builder Form -->
            <form id="builder-form" action="/admin/couple" method="POST" class="p-6 space-y-8 flex-grow">
                
                <!-- Tab 1: Info -->
                <div id="content-info" class="tab-content">
                    <div class="control-group">
                        <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-3 font-bold">Davetiye Kimliği</label>
                        <input type="text" name="slug" id="input-slug" required placeholder="berke-eda" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-accent text-sm mb-2" oninput="updatePreview()">
                        <p class="text-[9px] text-gray-400 italic">Render URL'nizin sonu olacak (örn: /davetiye/berke-eda)</p>
                    </div>

                    <div class="control-group">
                        <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-3 font-bold">Çift Bilgileri</label>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <input type="text" name="bride_name" placeholder="Gelin Adı" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-accent text-sm" oninput="updatePreview()">
                            <input type="text" name="groom_name" placeholder="Damat Adı" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-accent text-sm" oninput="updatePreview()">
                        </div>
                        <input type="date" name="event_date" required class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-accent text-sm text-gray-500 mb-4" oninput="updatePreview()">
                        <input type="text" name="location_name" placeholder="Mekan Adı (Örn: Tasigo Otel)" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-accent text-sm mb-2" oninput="updatePreview()">
                        <input type="text" name="maps_link" placeholder="Google Maps Embed Linki" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-accent text-sm" oninput="updatePreview()">
                    </div>
                </div>

                <!-- Tab 2: Design -->
                <div id="content-design" class="tab-content hidden">
                    <div class="control-group">
                        <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-3 font-bold">Renk Paleti</label>
                        <div class="grid grid-cols-2 gap-4">
                            <div>
                                <label class="block text-[8px] uppercase mb-1 text-gray-500 italic">Ana Renk (Butonlar/Sayaç)</label>
                                <input type="color" name="primary_color" value="#4a4e3a" class="w-full h-12 p-1 border border-gray-100 rounded cursor-pointer" oninput="updatePreview()">
                            </div>
                            <div>
                                <label class="block text-[8px] uppercase mb-1 text-gray-500 italic">Arka Plan Rengi</label>
                                <input type="color" name="secondary_color" value="#f9f8f6" class="w-full h-12 p-1 border border-gray-100 rounded cursor-pointer" oninput="updatePreview()">
                            </div>
                        </div>
                    </div>

                    <div class="control-group">
                        <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-3 font-bold">Yazı Tipleri (Google Fonts)</label>
                        <div class="space-y-4">
                            <div>
                                <label class="block text-[8px] uppercase mb-1 text-gray-500 italic">Başlık Fontu (Serif)</label>
                                <select name="font_family_serif" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-accent text-sm" onchange="updatePreview()">
                                    <option value="Cormorant Garamond">Cormorant Garamond (Klasik Lüks)</option>
                                    <option value="Playfair Display">Playfair Display (Modern Serif)</option>
                                    <option value="Pinyon Script">Pinyon Script (Narin El Yazısı)</option>
                                    <option value="Great Vibes">Great Vibes (Zarif El Yazısı)</option>
                                    <option value="Cinzel">Cinzel (Heybetli Roma)</option>
                                    <option value="Alex Brush">Alex Brush (Akıcı El Yazısı)</option>
                                    <option value="Dancing Script">Dancing Script (Modern Kaligrafi)</option>
                                </select>
                            </div>
                            <div>
                                <label class="block text-[8px] uppercase mb-1 text-gray-500 italic">Metin Fontu (Sans-Serif)</label>
                                <select name="font_family_sans" class="w-full px-4 py-3 border border-gray-200 rounded-lg focus:outline-none focus:border-brand-accent text-sm" onchange="updatePreview()">
                                    <option value="Montserrat">Montserrat (Minimalist)</option>
                                    <option value="Lato">Lato (Zarif Sans)</option>
                                    <option value="Raleway">Raleway (Sofistike)</option>
                                    <option value="Roboto">Roboto (Temiz)</option>
                                    <option value="Open Sans">Open Sans (Evrensel)</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Tab 3: Images -->
                <div id="content-images" class="tab-content hidden">
                    <div class="space-y-6">
                        <!-- Cover Image -->
                        <div class="relative bg-gray-50 p-4 rounded-xl border border-dashed border-gray-200 group">
                            <label class="block text-[10px] uppercase tracking-widest text-gray-600 mb-2 font-bold italic">1. Kapak Görseli (Full-Width)</label>
                            <input type="file" onchange="uploadToCloudinary(this, 'cover')" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-brand-dark file:text-white cursor-pointer">
                            <input type="hidden" name="cover_image_url" id="url-cover">
                            <div id="loader-cover" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center text-[10px] font-bold text-brand-accent uppercase animate-pulse">Yükleniyor...</div>
                        </div>

                        <!-- Story Image -->
                        <div class="relative bg-gray-50 p-4 rounded-xl border border-dashed border-gray-200">
                            <label class="block text-[10px] uppercase tracking-widest text-gray-600 mb-2 font-bold italic">2. Hikayemiz Görseli (Full-Width)</label>
                            <input type="file" onchange="uploadToCloudinary(this, 'story')" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-brand-dark file:text-white cursor-pointer">
                            <input type="hidden" name="story_image_url" id="url-story">
                            <div id="loader-story" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center text-[10px] font-bold text-brand-accent uppercase animate-pulse">Yükleniyor...</div>
                        </div>

                        <!-- Thank You Image -->
                        <div class="relative bg-gray-50 p-4 rounded-xl border border-dashed border-gray-200">
                            <label class="block text-[10px] uppercase tracking-widest text-gray-600 mb-2 font-bold italic">3. Teşekkür Görseli (Full-Width)</label>
                            <input type="file" onchange="uploadToCloudinary(this, 'thankyou')" class="w-full text-xs text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-xs file:font-semibold file:bg-brand-dark file:text-white cursor-pointer">
                            <input type="hidden" name="thankyou_image_url" id="url-thankyou">
                            <div id="loader-thankyou" class="hidden absolute inset-0 bg-white/80 flex items-center justify-center text-[10px] font-bold text-brand-accent uppercase animate-pulse">Yükleniyor...</div>
                        </div>
                    </div>
                </div>

                <!-- Tab 4: List/Export -->
                <div id="content-list" class="tab-content hidden">
                    <div class="bg-gray-50 p-6 rounded-xl border border-gray-100 text-center">
                        <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-4 font-bold">Misafir Yönetimi</label>
                        <p class="text-xs text-gray-500 mb-6 font-light">Bu davetiye için gelen LCV (RSVP) listesini Excel'de açmak üzere CSV formatında indirebilirsiniz.</p>
                        <button type="button" onclick="exportData()" class="w-full py-4 bg-white border border-gray-200 text-brand-dark rounded-lg text-[10px] uppercase tracking-widest font-bold hover:bg-gray-50 transition-all flex items-center justify-center gap-2">
                             <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                             Misafir Listesini İndir (CSV)
                        </button>
                    </div>

                    <div class="mt-8 bg-gray-50 p-6 rounded-xl border border-gray-100">
                        <label class="block text-[10px] uppercase tracking-widest text-gray-400 mb-6 font-bold">Sayfa Bölümleri</label>
                        <div class="space-y-4">
                            <label class="flex items-center justify-between p-3 bg-white rounded border border-gray-100">
                                <span class="text-xs font-semibold text-gray-600 uppercase tracking-wider">Hikaye Bölümü</span>
                                <input type="checkbox" class="section-toggle w-5 h-5 accent-brand-accent" value="story" checked onchange="updatePreview()">
                            </label>
                            <label class="flex items-center justify-between p-3 bg-white rounded border border-gray-100">
                                <span class="text-xs font-semibold text-gray-600 uppercase tracking-wider">Detaylar & Sayaç</span>
                                <input type="checkbox" class="section-toggle w-5 h-5 accent-brand-accent" value="details" checked onchange="updatePreview()">
                            </label>
                            <label class="flex items-center justify-between p-3 bg-white rounded border border-gray-100">
                                <span class="text-xs font-semibold text-gray-600 uppercase tracking-wider">Harita Bölümü</span>
                                <input type="checkbox" class="section-toggle w-5 h-5 accent-brand-accent" value="map" checked onchange="updatePreview()">
                            </label>
                            <label class="flex items-center justify-between p-3 bg-white rounded border border-gray-100">
                                <span class="text-xs font-semibold text-gray-600 uppercase tracking-wider">LCV (RSVP) Formu</span>
                                <input type="checkbox" class="section-toggle w-5 h-5 accent-brand-accent" value="rsvp" checked onchange="updatePreview()">
                            </label>
                        </div>
                        <input type="hidden" name="active_sections" id="active_sections_hidden">
                    </div>
                </div>

                <div class="sticky bottom-0 bg-white pt-4 pb-6 border-t border-gray-100 mt-auto">
                    <button type="submit" class="w-full bg-brand-dark text-white font-bold py-5 rounded-xl transition-all uppercase tracking-[0.2em] text-xs shadow-xl hover:bg-black">
                        Davetiyeyi Yayınla
                    </button>
                    <p class="text-[9px] text-center text-gray-400 mt-3 italic uppercase font-bold tracking-widest">Tüm Değişiklikler Kayıt Edilecek</p>
                </div>
            </form>
        </aside>

        <!-- Right: Preview Area -->
        <main class="preview-area flex flex-col items-center py-10">
            <!-- Mobile Frame Mockup -->
            <div class="relative w-[340px] h-[700px] bg-white rounded-[60px] border-[12px] border-gray-800 shadow-2xl overflow-hidden scale-90 md:scale-100 transition-transform">
                <iframe id="preview-iframe" name="preview-iframe" src="about:blank"></iframe>
            </div>
            
            <!-- Controls below frame -->
            <div class="mt-8 flex gap-4">
                <button onclick="updatePreview()" class="bg-white px-6 py-2 rounded-full border border-gray-200 text-[10px] uppercase tracking-widest font-bold text-gray-500 hover:text-brand-dark shadow-sm">
                    Önizlemeyi Yenile
                </button>
                <div class="bg-brand-accent px-6 py-2 rounded-full text-white text-[10px] uppercase tracking-widest font-bold">
                    Canlı Önizleme Aktif
                </div>
            </div>
        </main>
    </div>

    <!-- Hidden form for preview POST -->
    <form id="preview-form" action="/admin/preview" method="POST" target="preview-iframe" class="hidden"></form>

    <script>
        function showTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('content-' + tabId).classList.remove('hidden');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        async function uploadToCloudinary(input, type) {
            const file = input.files[0];
            if (!file) return;

            const loader = document.getElementById('loader-' + type);
            const urlInput = document.getElementById('url-' + type);
            
            loader.classList.remove('hidden');

            const formData = new FormData();
            formData.append('file', file);

            try {
                const response = await fetch('/admin/upload', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.url) {
                    urlInput.value = data.url;
                    loader.textContent = "BAŞARILI!";
                    setTimeout(() => {
                        loader.classList.add('hidden');
                        loader.textContent = "Yükleniyor...";
                        updatePreview();
                    }, 1000);
                }
            } catch (err) {
                loader.textContent = "HATA!";
                setTimeout(() => loader.classList.add('hidden'), 2000);
            }
        }

        function updatePreview() {
            const builderForm = document.getElementById('builder-form');
            const previewForm = document.getElementById('preview-form');
            previewForm.innerHTML = '';
            
            const checkboxes = document.querySelectorAll('.section-toggle:checked');
            const sections = Array.from(checkboxes).map(cb => cb.value);
            document.getElementById('active_sections_hidden').value = JSON.stringify(sections);

            const formData = new FormData(builderForm);
            for (let [key, value] of formData.entries()) {
                const input = document.createElement('input');
                input.type = 'hidden';
                input.name = key;
                input.value = value;
                previewForm.appendChild(input);
            }
            previewForm.submit();
        }

        function exportData() {
            const slug = document.getElementById('input-slug').value;
            if (!slug) {
                alert("Önce bir URL uzantısı (slug) girmelisiniz!");
                return;
            }
            window.location.href = `/admin/export/${slug}`;
        }

        window.onload = () => {
            setTimeout(updatePreview, 500);
        };
    </script>

</body>
</html>
